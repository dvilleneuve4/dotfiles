# DATE - Below day
label {
    monitor = DP-1
    text = cmd[update:60000] echo "$(date +"%d %B %Y")"
    color = rgba(205, 214, 244, 0.65)
    font_size = 24
    font_family = JetBrains Mono Nerd Font
    position = 0, 350
    halign = center
    valign = center
}

# USERNAME - Below date
label {
    monitor = DP-1
    text = Hello, $USER
    color = rgba(205, 214, 244, 0.65)
    font_size = 20
    font_family = JetBrains Mono Nerd Font
    position = 0, 190
    halign = center
    valign = top
}

# ===================================================================
# INPUT FIELD - On DP-1 only, centered
# ===================================================================
input-field {
    monitor = DP-1
    size = 300, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    fade_on_empty = false
    placeholder_text = <i><span foreground="##CDD6F499">Enter password...</span></i>
    hide_input = false
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    
    # Colors matching Catppuccin-Mocha
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(48, 45, 42, 0.35)
    font_color = rgb(205, 214, 244)
    font_family = JetBrains Mono Nerd Font
    
    position = 0, 0
    halign = center
    valign = center
}

# ===================================================================
# ERROR/FAILURE INDICATOR
# ===================================================================
# Text label showing failure count - below input field
label {
    monitor = DP-1
    text = cmd[update:1000] echo "$FAIL attempts failed"
    color = rgba(243, 139, 168, 0.9)  # Catppuccin red
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    position = 0, -120
    halign = center
    valign = center
}

