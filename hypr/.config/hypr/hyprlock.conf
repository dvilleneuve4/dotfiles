# Hyprlock Configuration
# Customized with blurred screenshot background, single monitor input, error display, and password toggle
# Inspired by: typecraft-dev/dotfiles, MrVivekRajan/Hyprlock-Styles (Style-5 & Style-10)

# GENERAL
general {
    hide_cursor = true
    ignore_empty_input = true
}

# BACKGROUND
# Uses screenshot of current screen with blur
# This captures what was on screen before locking
background {
    monitor =
    path = screenshot
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# ===================================================================
# LABELS - All on DP-1 (left monitor)
# Positioned from top to bottom, centered
# ===================================================================

# TIME - Centered near top
label {
    monitor = DP-1
    text = cmd[update:1000] echo "$(date +"%R")"
    color = rgba(205, 214, 244, 0.75)
    font_size = 90
    font_family = JetBrains Mono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

