# Kitty Terminal Configuration
# Customized from typecraft-dev/dotfiles sample

# Font settings
font_family    JetBrainsMono Nerd Font Mono
bold_font      auto
italic_font    auto
bold_italic_font auto
font_size 14

# Window transparency
background_opacity 0.9

# Window padding
window_padding_width 10

# Scrollback
scrollback_lines 2000

# Cursor style
cursor_blink_interval 0.8
cursor_style block

# Hide tab bar (we're not using tabs)
tab_bar_style hidden

# Include theme
include theme.conf

# URL handling
url_color #F5E0DC
url_style curly

# Mouse settings
mouse_hide_wait 3.0

# Window behavior
single_window_padding_width -1
window_resize_step_cells 2

# Performance
repaint_delay 10
input_delay 5

# Shell integration
enable_audio_bell no
visual_bell_duration 0

# Content type
content_type: text/plain; charset=utf-8
