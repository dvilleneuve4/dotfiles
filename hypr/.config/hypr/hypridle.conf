# Hypridle Configuration
# Based on typecraft-dev/dotfiles with suspend enabled
# https://github.com/typecraft-dev/dotfiles/blob/master/hyprland/.config/hypr/hypridle.conf

# General configuration
general {
    # Command to run when locking (only if not already locked)
    lock_cmd = pidof hyprlock || hyprlock
    
    # Run before sleeping (e.g., lock the session)
    before_sleep_cmd = loginctl lock-session
    
    # Run after waking from sleep
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Dim the screen after 5 minutes of idle
listener {
    timeout = 300
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# Lock the screen after 5.5 minutes of idle
listener {
    timeout = 330
    on-timeout = loginctl lock-session
}

# Turn off the display after 6 minutes of idle
listener {
    timeout = 350
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend the computer after 15 minutes of idle
listener {
    timeout = 900
    on-timeout = systemctl suspend
}

# Note: The Waybar idle inhibitor module will pause hypridle
# during video playback, presentations, etc.
